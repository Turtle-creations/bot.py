{% extends "base.html" %}

{% block content %}
<section class="page-section">
    <div class="container narrow card">
        <span class="eyebrow">{{ site_name }}</span>
        <h1>{{ page.title }}</h1>
        <p>{{ page.intro }}</p>
        {% for section in page.sections %}
        <p>{{ section }}</p>
        {% endfor %}
    </div>
</section>
{% endblock %}
