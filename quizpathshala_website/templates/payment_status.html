{% extends "base.html" %}

{% block content %}
<section class="page-hero">
    <div class="container narrow">
        <span class="eyebrow">{{ title }}</span>
        <h1>{{ message }}</h1>
        <p>{{ detail }}</p>
    </div>
</section>

<section class="section">
    <div class="container narrow">
        <div class="text-page">
            {% if order %}
            <p><strong>Order ID:</strong> {{ order.order_id }}</p>
            <p><strong>Status:</strong> {{ order.status }}</p>
            {% endif %}
            <div class="hero-actions">
                <a class="button button-primary" href="https://t.me/QuizPathshala_bot" target="_blank" rel="noopener">Buy Premium</a>
                <a class="button button-secondary" href="https://t.me/QuizPathshala_bot" target="_blank" rel="noopener">Open Telegram Bot</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
