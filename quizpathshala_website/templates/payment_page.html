{% extends "base.html" %}

{% block content %}
<section class="page-hero">
    <div class="container narrow">
        <span class="eyebrow">Payment</span>
        <h1>Razorpay checkout</h1>
        <p>{{ plan.name }} premium plan for INR {{ '%.2f'|format(order.amount / 100) }}</p>
    </div>
</section>

<section class="section">
    <div class="container narrow">
        <div class="text-page">
            <p>Secure payment is handled by Razorpay. Premium is activated only after a valid captured-payment webhook reaches the server.</p>
            <button class="button button-primary" id="pay-btn">Pay with Razorpay</button>
        </div>
    </div>
</section>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
const options = {{ checkout_options|safe }};
options.handler = function (response) {
    const form = document.createElement("form");
    form.method = "POST";
    form.action = "{{ public_base_url }}/payment/success";
    for (const [key, value] of Object.entries(response)) {
        const input = document.createElement("input");
        input.type = "hidden";
        input.name = key;
        input.value = value;
        form.appendChild(input);
    }
    document.body.appendChild(form);
    form.submit();
};
options.modal = {
    ondismiss: function () {
        window.location.href = "{{ public_base_url }}/payment/cancel?razorpay_order_id={{ order.order_id }}";
    }
};
const rzp = new Razorpay(options);
rzp.on("payment.failed", function (response) {
    const reason = encodeURIComponent(response.error && (response.error.description || response.error.code) || "payment_failed");
    window.location.href = "{{ public_base_url }}/payment/failed?razorpay_order_id={{ order.order_id }}&reason=" + reason;
});
document.getElementById("pay-btn").addEventListener("click", function (event) {
    event.preventDefault();
    rzp.open();
});
</script>
{% endblock %}
